name: Build Android APK

on:
  push:
    branches: [ main ] # تأكد أن هذا هو اسم فرعك الرئيسي (main أو master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # هذا السطر السحري الجديد يقوم بتوليد ملف gradlew تلقائياً في حال عدم وجوده
    - name: Validate or Generate Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradlew not found, generating wrapper..."
          gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
