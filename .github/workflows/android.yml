name: Build Android APK

on:
  push:
    branches: [ main ] # تأكد أن هذا هو اسم فرعك (main أو master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # استخدام الـ Gradle المثبت على النظام مباشرة بدلاً من الـ Wrapper
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    # البناء مباشرة عبر نظام السيرفر دون الحاجة لملف gradlew المحلي
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
